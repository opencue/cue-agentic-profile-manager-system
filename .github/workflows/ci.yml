name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install

      - name: Run tests
        run: bun test --timeout 30000

      - name: Verify CLI boots
        run: bun src/index.ts --version

      - name: Smoke-test install.sh into a throwaway prefix
        shell: bash
        run: |
          PREFIX="$(mktemp -d)"
          # Stub authmux so install.sh's Step 5 doesn't run `npm install -g`.
          printf '#!/usr/bin/env bash\necho 0.0.0\n' > "$PREFIX/authmux"
          chmod +x "$PREFIX/authmux"
          SHIM_DIR="$PREFIX" CUE_DIR="$GITHUB_WORKSPACE" PATH="$PREFIX:$PATH" bash ./install.sh --yes
          test -L "$PREFIX/cue" -o -f "$PREFIX/cue"
          grep -q 'exec cue launch claude' "$PREFIX/claude"
          PATH="$PREFIX:$PATH" "$PREFIX/cue" --version

      - name: Verify bundled CLI boots
        run: bun run build:bundle && node dist/cue.js --version

      - name: Validate all profiles
        run: bun src/index.ts validate --all || true

  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install

      - name: Type check
        run: bun x tsc --noEmit --skipLibCheck

      - name: Lint (biome)
        run: bun run lint

      # Advisory until the skill-hygiene backlog (duplicate slugs etc.) is
      # cleared; `skills lint --all` currently reports 174 errors the
      # materializer tolerates via last-wins. Fixed the command (was a silent
      # no-op: bare `skills-lint` exits 1 on usage, masked by `|| true`).
      - name: Lint skills
        run: bun src/index.ts skills lint --all || true
