name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install

      - name: Run tests
        run: bun test --timeout 30000

      - name: Verify CLI boots
        run: bun src/index.ts --version

      - name: Validate all profiles
        run: bun src/index.ts validate --all || true

  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install

      - name: Type check
        run: bun run typecheck

      # Surface skill-lint output (was a silent no-op: bare `skills-lint`
      # exits 1 on a usage error, masked by `2>/dev/null || true`; the real
      # command is `skills lint --all`). Kept non-blocking until the
      # skill-hygiene backlog is cleared.
      - name: Lint skills
        run: bun src/index.ts skills lint --all || true
