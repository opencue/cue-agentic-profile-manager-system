name: Profiles CI

on:
  pull_request:
    paths:
      - "bin/**"
      - "profiles/**"
      - "docs/profiles/**"
      - "test/e2e/**"
      - "README.md"
      - "package.json"
      - "bun.lock"
      - ".github/workflows/profiles-ci.yml"
  push:
    branches: ["main"]
    paths:
      - "bin/**"
      - "profiles/**"
      - "docs/profiles/**"
      - "test/e2e/**"
      - "README.md"
      - "package.json"
      - "bun.lock"
      - ".github/workflows/profiles-ci.yml"

jobs:
  e2e:
    name: Profiles e2e (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]

    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Cache Bun and npx profile artifacts
        uses: actions/cache@v4
        with:
          path: |
            ~/.bun/install/cache
            profiles/_cache/bun
            profiles/_cache/npx
          key: ${{ runner.os }}-profiles-${{ hashFiles('bun.lock', 'profiles/**/*.yaml') }}
          restore-keys: |
            ${{ runner.os }}-profiles-

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Run profile smoke tests
        run: bash test/e2e/run.sh
