<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 880 480" fill="none" role="img" aria-label="cue optimizer readme-writer-svg profile card">
  <style>
    .t-name    { font: 700 22px -apple-system, system-ui, sans-serif; fill: #f1f5f9; }
    .t-desc    { font: 12px -apple-system, system-ui, sans-serif; fill: #94a3b8; }
    .t-stat-l  { font: 10px -apple-system, system-ui, sans-serif; letter-spacing: 1.5px; fill: #94a3b8; }
    .t-eyebrow { font: 11px -apple-system, system-ui, sans-serif; letter-spacing: 2px; fill: #94a3b8; }
    .row-lbl   { font: 12px 'SF Mono', monospace; fill: #f1f5f9; }
    .row-lbl-b { font: 700 12px 'SF Mono', monospace; fill: #f1f5f9; }
    .row-val   { font: 10px 'SF Mono', monospace; fill: #64748b; }
    .row-val-on{ font: 10px 'SF Mono', monospace; fill: #cbd5e1; }
    .t-foot    { font: 10px 'SF Mono', monospace; fill: #94a3b8; }
    .bar-bg    { fill: #334155; fill-opacity: 0.55; }
    .badge     { font: 700 10px 'SF Mono', monospace; fill: #ec4899; }
  </style>
  <defs>
    <linearGradient id="pcBg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ec4899" stop-opacity="0.16"/>
      <stop offset="100%" stop-color="#8b5cf6" stop-opacity="0.02"/>
    </linearGradient>
  </defs>

  <rect x="20" y="20" width="840" height="440" rx="18" fill="url(#pcBg)" stroke="#f472b6" stroke-opacity="0.55" stroke-width="1.5"/>

  <!-- header -->
  <g transform="translate(44,52)">
    <text x="0" y="0" font-size="36">🎨</text>
    <text x="48" y="-4" class="t-name">readme-writer-svg</text>
    <text x="48" y="14" class="t-desc">Beautiful README design with SVG diagrams — architecture flows, terminal mockups, editorial visuals.</text>

    <!-- "active session" badge -->
    <g transform="translate(680,-22)">
      <rect width="116" height="22" rx="11" fill="#ec4899" fill-opacity="0.18" stroke="#f472b6" stroke-opacity="0.6"/>
      <circle cx="14" cy="11" r="3" fill="#4ade80"/>
      <text x="24" y="15" class="badge">ACTIVE SESSION</text>
    </g>
  </g>

  <!-- stat row -->
  <g transform="translate(44,96)">
    <g>
      <text x="0" y="0" class="t-stat-l">📦 SKILLS</text>
      <text x="0" y="24" font-family="-apple-system, system-ui, sans-serif" font-size="22" font-weight="800" fill="#f472b6">8</text>
    </g>
    <g transform="translate(110,0)">
      <text x="0" y="0" class="t-stat-l">🔌 MCPs</text>
      <text x="0" y="24" font-family="-apple-system, system-ui, sans-serif" font-size="22" font-weight="800" fill="#c4b5fd">0</text>
    </g>
    <g transform="translate(220,0)">
      <text x="0" y="0" class="t-stat-l">🖥️  CLIs</text>
      <text x="0" y="24" font-family="-apple-system, system-ui, sans-serif" font-size="22" font-weight="800" fill="#4ade80">3/3</text>
    </g>
    <g transform="translate(330,0)">
      <text x="0" y="0" class="t-stat-l">📊 USAGE</text>
      <text x="0" y="24" font-family="-apple-system, system-ui, sans-serif" font-size="22" font-weight="800" fill="#fbbf24">62×</text>
    </g>
    <g transform="translate(440,0)">
      <text x="0" y="0" class="t-stat-l">⚡ THIS SESSION</text>
      <text x="0" y="24" font-family="-apple-system, system-ui, sans-serif" font-size="22" font-weight="800" fill="#f472b6">7×</text>
    </g>
  </g>

  <!-- skills list — readme-writer-svg actual skills with realistic usage -->
  <g transform="translate(44,168)">
    <text x="0" y="0" class="t-eyebrow">SKILLS · CALLED ACROSS SESSIONS · ⚡ = THIS SESSION</text>

    <g transform="translate(0,22)">
      <!-- readme-svg-design — most used THIS session -->
      <g>
        <text x="0" y="11" class="row-lbl-b">readme-svg-design</text>
        <rect x="240" y="2" width="520" height="10" rx="3" class="bar-bg"/>
        <rect x="240" y="2" width="156" height="10" rx="3" fill="#f472b6"/>
        <text x="400" y="11" font-family="'SF Mono', monospace" font-size="10" fill="#f472b6" font-weight="700">⚡ 6× now</text>
      </g>
      <!-- caveman — high all-time -->
      <g transform="translate(0,22)">
        <text x="0" y="11" class="row-lbl">caveman</text>
        <rect x="240" y="2" width="520" height="10" rx="3" class="bar-bg"/>
        <rect x="240" y="2" width="364" height="10" rx="3" fill="#fbbf24"/>
        <text x="610" y="11" class="row-val-on">21× total</text>
      </g>
      <g transform="translate(0,44)">
        <text x="0" y="11" class="row-lbl">analyze</text>
        <rect x="240" y="2" width="520" height="10" rx="3" class="bar-bg"/>
        <rect x="240" y="2" width="208" height="10" rx="3" fill="#a78bfa"/>
        <text x="452" y="11" class="row-val-on">12× total</text>
      </g>
      <g transform="translate(0,66)">
        <text x="0" y="11" class="row-lbl">caveman-commit</text>
        <rect x="240" y="2" width="520" height="10" rx="3" class="bar-bg"/>
        <rect x="240" y="2" width="190" height="10" rx="3" fill="#a78bfa"/>
        <text x="434" y="11" class="row-val-on">11× total</text>
      </g>
      <g transform="translate(0,88)">
        <text x="0" y="11" class="row-lbl">cue-usage</text>
        <rect x="240" y="2" width="520" height="10" rx="3" class="bar-bg"/>
        <rect x="240" y="2" width="46" height="10" rx="3" fill="#4ade80"/>
        <text x="290" y="11" class="row-val-on">3×</text>
        <text x="316" y="11" font-family="'SF Mono', monospace" font-size="10" fill="#f472b6" font-weight="700">⚡ 1× now</text>
      </g>
      <g transform="translate(0,110)">
        <text x="0" y="11" class="row-lbl">aiq-research</text>
        <rect x="240" y="2" width="520" height="10" rx="3" class="bar-bg"/>
        <text x="770" y="11" class="row-val">—</text>
      </g>
      <g transform="translate(0,132)">
        <text x="0" y="11" class="row-lbl">skill-evolution</text>
        <rect x="240" y="2" width="520" height="10" rx="3" class="bar-bg"/>
        <text x="770" y="11" class="row-val">—</text>
      </g>
      <g transform="translate(0,154)">
        <text x="0" y="11" class="row-lbl">builtin-manager</text>
        <rect x="240" y="2" width="520" height="10" rx="3" class="bar-bg"/>
        <text x="770" y="11" class="row-val">—</text>
      </g>
    </g>
  </g>

  <!-- footer -->
  <g transform="translate(44,432)">
    <text x="0" y="0" class="t-foot">scanned from <tspan fill="#cbd5e1">~/.claude/projects/**/*.jsonl</tspan> · live data refreshed on every <tspan fill="#cbd5e1">cue optimizer</tspan> run</text>
  </g>
</svg>
