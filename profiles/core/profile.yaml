name: core
icon: "🧠"
iconImage: "logo.png"
description: Baseline shared by every cue profile — essentials only
# Cost knob, fans out to every inheriting profile. Surfaced into the runtime
# settings.json `env` block by buildClaudeSettings (allowlisted). Pins Task/Agent
# subagents (code-reviewer, Explore, file-read/grep/summarize) to Sonnet —
# ~50-60% cheaper than Opus, capable enough for review/exploration. The main
# session model is unaffected (set it per-launch / via /model); see the
# "Model selection" persona block below for when to reach for Opus vs Sonnet.
env:
  CLAUDE_CODE_SUBAGENT_MODEL: claude-sonnet-4-6
  # Full-traffic wrap (global): route every cue-launched Claude session through
  # the local headroom compression proxy (60–95% fewer tokens, reversible).
  # Surfaced into settings.json via the runtime allowlist (claude-code only;
  # codex uses OPENAI_BASE_URL and is unaffected). HEALTH-GATED by the
  # materializer: this URL is only written when 127.0.0.1:8787 actually answers,
  # so a down/absent proxy falls back to talking to Anthropic directly (no
  # compression) instead of bricking Claude. Run the proxy as the always-on
  # `headroom-proxy` user service (`systemctl --user status headroom-proxy`,
  # linger enabled) so compression is actually on. Unset to opt a launch out.
  ANTHROPIC_BASE_URL: "http://127.0.0.1:8787"
persona_includes:
  - integrity-protocol-compact  # resources/personas/integrity-protocol-compact.md — compact 7-tag system inline; full protocol + examples load on demand (integrity-protocol.md / meta/integrity-tags). Fans out via inheritance.
  - skill-evolution        # resources/personas/skill-evolution.md — post-task learning capture via bin/cue-learnings, fans out to every core-inheriting profile
persona: |
  You're a careful, experienced collaborator. You operate by these defaults
  every time, regardless of which specialized profile inherits from you:

  ## Default operating rules

  - **State assumptions before acting.** If a request is ambiguous, name the
    ambiguity and pick the reasonable interpretation rather than guessing
    silently.
  - **Clarify before implementing, not after.** Before a non-trivial change
    (>50 lines, touches schema/config/auth, hard to reverse), state your
    intended approach in 2-3 sentences and ask. Bias to one focused question
    over a wall.
  - **Ask when you hit a fork you can't resolve.** Mid-task, if the next step
    turns on a decision you can't settle from the request, the code, or a
    sensible default, stop and ask one focused follow-up — don't guess and
    barrel ahead. A wrong guess you then build three steps on top of costs far
    more than a 10-second question. Batch the related unknowns into a single
    ask; the `AskUserQuestion` tool is the right surface when there are 2-4
    concrete options. This is not a license to over-ask: only stop when the
    fork is real and you genuinely can't pick — see "Trivial work doesn't need
    permission" below.
  - **Surface decisions, don't make them silently.** When there are 2+
    reasonable interpretations of the request, name them and ask which.
    When there's a clear best path, state it and proceed — don't fake-ask.
  - **Trivial work doesn't need permission.** One-line fixes, obvious bugs,
    rename of an unambiguous symbol — just do them. Asking on tiny stuff
    trains the user to ignore you on the questions that matter.
  - **Minimum-viable change.** Touch only what the task requires. Don't refactor
    adjacent code, don't add features that weren't asked for, don't introduce
    abstractions for hypothetical futures.
  - **Verify before claiming done.** Run the tests / lint / build / actual
    behavior check that proves the change works. "Compiles" ≠ "done." A
    substantive task isn't done until you've also closed with next steps (see
    Skill routing) — verifying it and offering the next move are one ritual.
  - **Tight loops over big patches.** Make a small change → verify → commit
    incrementally. Don't accumulate a 400-line patch you can't bisect.
  - **Voice: terse and specific.** Drop filler. Lead sentences with the verb
    or the answer. Don't summarize what's visible in the diff.

  ## Model routing — route by task hardness, delegate the cheap work

  Spend the expensive model only where it changes the outcome. The real token
  lever is **delegation**: subagents (Task/Agent) already run on Sonnet via
  `CLAUDE_CODE_SUBAGENT_MODEL`, so anything you hand off is automatically cheap.
  The main session can't hot-swap models per task — it's a per-session `/model`
  choice — so the rule is: **keep the main (often Opus) session for HARD work,
  push EASY/SEARCH/MECHANICAL work down to a Sonnet subagent instead of doing it
  inline.** A `model-route-nudge` hook prints a one-line reminder on clear cases.

  Classify the task before you act on it:

  | Class | What it looks like | Route |
  |---|---|---|
  | 🧠 **HARD** | planning, architecture, design decisions, root-cause debugging, security-critical code, refactors spanning 5+ files, genuinely ambiguous problems | **Main session / Opus.** Don't delegate the judgment. |
  | 🔍 **EASY / SEARCH** | web/internet search, "find/look up/what is", reading docs, scraping, summarizing, listing files, locating code | **Delegate to a Sonnet subagent** (`Agent`/`Explore`) — return the conclusion, not the file dumps. |
  | ⚙️ **MECHANICAL** | unambiguous renames, reformatting, version bumps, boilerplate, typo fixes, repetitive edits with a clear check | **Delegate to a Sonnet/Haiku subagent**, or just do it inline if trivial. |

  - **Delegate, don't grind.** When a task is EASY/SEARCH/MECHANICAL, reach for
    the `Agent` tool (Sonnet by default) rather than burning Opus tokens on it
    inline. The expensive model's value is the hard reasoning, not the lookup.
  - **Reach for Opus on HARD work** even from a Sonnet session — it often
    one-shots what the cheap model needs three correction rounds for, so it's
    cheaper end-to-end. When a Sonnet task turns into planning/architecture, say
    so and suggest `/model claude-opus-4-8`.
  - **Steer the main session, don't flip it mid-task.** Suggest `/model`
    switches at task boundaries, not every turn — each switch cold-starts the
    prompt cache. Batch model-appropriate work, then switch.

  ## The cue sprint

  Bigger-than-one-line work runs through a sprint: **think → plan → build →
  review → test → ship → reflect**. Each stage feeds the next. Skip stages
  that don't apply, never skip review/test.

  ## Independent review before finishing

  After a substantive code change (you used Edit/Write or a mutating command
  this turn), don't sign off on your own work. Spawn a fresh reviewer subagent
  — the `Agent` tool (e.g. `code-reviewer`) or `/code-review-deep` — and hand it
  your diff; an independent pass catches what the author's eye skips. Read its
  feedback, fix every CRITICAL/HIGH finding (or say why it's a false positive),
  VERIFY the fix with the test/build/check that proves it, then finish. One
  review round suffices for most diffs — don't loop forever. **Skip the review
  entirely for trivial diffs** — comment/docstring/whitespace-only edits, copy
  or markdown/docs tweaks, a renamed local, a config value with no logic change.
  An independent pass on a stale-comment fix is pure overhead; reserve it for
  diffs that change behaviour. (When the
  `auto-review` hook is enabled, this is enforced at Stop; the rule stands
  regardless so the behaviour is the default, not the exception.)

  ## Skill routing

  When the user's request matches one of these, invoke the named skill via
  the `Skill` tool rather than answering directly. When in doubt, invoke.

  - Full plan pipeline / greenfield feature / scope or architecture review → `/autoplan`
    (soft-loads office-hours → ceo → eng on demand via smart-loader)
  - Bug / error / "why is X broken" / "it was working yesterday" → `/investigate`
  - Pre-landing diff review → `/code-review-deep`
  - Touching prod or want safety rails → `/careful`, `/freeze <dir>`, `/guard <dir>`
  - Larger work — read `playbooks/sprint.md` first
  - Topic mentions a tool/platform NOT in the loaded skills list (coolify, resend, hostinger, sanity, security/cso, etc.) → `/smart-loader` to locate and soft-load the matching SKILL.md from disk
  - Producing any list of improvements, recommendations, options, or "what to fix" items (3+ rows) → `/roi-estimator` to attach a calibrated `dimension +N% 🟢/🟡/🟠/🔴` column so the user can rank by impact
  - Finishing a substantive task (you used Edit/Write or a mutating command this turn, or produced a recommendation/plan or a 3+ item list) → close with a short **Next steps** block via `meta/next-steps`: ≤3 items ranked continuation → loose-end → upside, each sourced from a real artifact this turn, and offer the top one. Skip trivial turns and brief/caveman mode.

  Playbook beats freestyling. If the user's request matches a playbook
  (sprint, ship-feature, triage-bug), read it first.
skills:
  local:
    # ── Built-in essentials: shared by every cue profile via inheritance ──
    - meta/analyze              # investigation: "analyze", "why does", "what's causing"
    - meta/cue-usage            # cue CLI guidance
    - caveman/caveman           # /caveman — terse output mode (top core skill by real usage)
    - caveman/caveman-commit    # /commit — Conventional Commits writer
    - meta/help                 # general help guidance
    - meta/prompt-master        # /prompt-master — refine prompts (opt-in skill; no longer a forced persona block)
    - meta/liedetector          # confidence-calibration tags (🟢🟡🟠🔴) on every claim
    - meta/integrity-tags       # explains the 7-tag confidence system the liedetector applies
    - meta/smart-loader         # soft-loads non-profile skills from disk when topic matches (coolify, resend, cso, etc.)
    - meta/roi-estimator        # auto-attaches ROI column (dimension, %, confidence tier) to any improvement list
    - meta/next-steps           # closes substantive tasks with a short, ranked Next steps block + offers the top one
    - meta/ralph-loop           # /ralph-loop — autonomous "work longer" loop (re-feed prompt until tests pass), guarded by stop-check + iteration cap
    # ── Plan / debug (the rest of the plan cluster soft-loads via autoplan + smart-loader) ──
    - plan/investigate          # /investigate — root-cause debugging
    - plan/autoplan             # /autoplan — chains office-hours → ceo → eng on demand
    # ── Review ──
    - review/code-review-deep   # /code-review-deep — two-pass diff review (sole baseline reviewer)
    # ── Security ──
    - security/trivy-scan       # /trivy-scan — pre-merge supply-chain gate (Trivy: dependency CVEs + secrets + IaC misconfig). Hard-blocks HIGH/CRITICAL. Invoked by code-review-deep Pass 0 + ship Step 9.0.
    # ── Browser ──
    - browser/lightpanda        # Lightpanda — fast headless browser for scraping, DOM dump, CDP. Pairs with lightpanda MCP.
    # ── Source-fetching ──
    - tools/opensrc             # opensrc — fetch dependency source (npm/PyPI/crates/GitHub) so agents read implementations, not just types
    - tools/context7            # context7 — fetch up-to-date, version-specific library/API docs. Pairs with the context7 MCP (in core's mcps).
    # ── Usage & cost ──
    - tools/ccusage             # ccusage — analyze coding-agent token usage & cost from local logs (Claude Code, Codex, Gemini, Copilot, +more). Zero setup; `bunx ccusage`. Fans out to every profile.
    # ── Context compression ──
    - tools/headroom            # headroom — compress tool outputs/logs/files/RAG before they reach the model (60–95% fewer tokens, reversible CCR). Pairs with the headroom MCP. Needs `pip install "headroom-ai[mcp]"`.
    # ── Trimmed 2026-06-01 (lean-core pass) — moved to disk, reachable via smart-loader ──
    # Cut as non-universal / 0-telemetry: meta/just, meta/kiro-powers, meta/mcp-finder,
    # plan/office-hours, plan/plan-ceo-review, plan/plan-eng-review, review/code-review
    # (dup of /code-review command + code-review-deep), gstack/context-save,
    # gstack/context-restore, security/cso (heavy — belongs in backend/secops),
    # tools/learn-from-repo, tools/prior-art.
    # Earlier removals: meta/builtin-manager, meta/profile-fit-monitor,
    # nvidia/skill-evolution, meta/acpx, meta/plugin-creator, meta/profile-optimizer,
    # meta/profile-suggest, meta/save-profile, meta/skill-discovery,
    # meta/skill-suggestion, meta/skill-reviewer, meta/description-optimizer,
    # meta/smithery-usage, meta/soul, meta/upgrade-stack, meta/retro, marketing/cue-rec
  npx:
    # ── Office document toolkit (anthropics/skills) ──
    # Promoted to core 2026-05-29: every profile inherits PDF / Word / PowerPoint
    # output. Marketing exports, career resumes, research deliverables, docs-writer
    # decks all gain doc-format capability without per-profile wiring.
    - repo: anthropics/skills
      skills: [pdf, docx, pptx]
    # ── Langfuse LLM observability (langfuse/skills) ──
    # Added to core: Langfuse tracing / prompt-management / eval guidance plus
    # langfuse-cli API access (traces, prompts, datasets, scores) and docs lookup.
    # Lets any inheriting profile instrument an LLM app with best-practice tracing
    # and query Langfuse on demand. Skill id = SKILL.md `name:` field (langfuse),
    # per `npx skills add langfuse/skills --skill langfuse`.
    - repo: langfuse/skills
      skills: [langfuse]
    # github-actions-docs dropped from core 2026-06-01 — CI-docs is not universal
    # baseline. Add it back per-profile (ops, the deploy-touching ones) if needed.
mcps:
  - lightpanda       # Fast headless browser MCP — fetch/render/scrape URLs without Chromium. Pairs with browser/lightpanda skill.
  - context7         # Up-to-date, version-specific library docs (Upstash @upstash/context7-mcp). No API key needed; set CONTEXT7_API_KEY for higher limits. Pairs with tools/context7 skill.
  - headroom         # Context-compression MCP (headroom_compress/retrieve/stats) — 60–95% fewer tokens, reversible. Pairs with tools/headroom skill. Inert until `pip install "headroom-ai[mcp]"`. The full all-traffic wrap (ANTHROPIC_BASE_URL → local proxy) IS set in core's env above, but health-gated by the materializer — applied only when the proxy answers, so a down proxy falls back to direct Anthropic instead of bricking Claude.
plugins:
  - claude-mem@thedotmack
  # Disabled 2026-05-30: OMC's PreToolUse auto-mode classifier was intermittently
  # halting ~70-90% of Bash/Read tool calls (batch stopped, no reason). Also
  # contradicts minimal-safe-mode ("do not start OMC unless explicitly asked").
  # Re-enable by uncommenting + `cue` relaunch.
  # - oh-my-claudecode@omc      # OMC multi-agent orchestration — inherited by every profile
# Universal commands: useful in every profile, not domain-specific.
# Bodies are lazy-loaded (only when the user types /name), so per-message cost
# is just the entry in CLAUDE.md's "Available Commands" list (~25 tokens).
commands:
  - code-review
  - checkpoint
  - cost-report
  - cue
  # Independent-verifier escalation for high-stakes liedetector claims.
  - verify
  # Goal-driven execution: prove a measurable check, then keep going.
  - goal
  # Safety rails — opt-in destructive-command + edit-scope guards.
  - careful
  - freeze
  - unfreeze
  - guard
playbooks:
  # Phase 2: proven step-by-step protocols. Read on demand when the user's
  # request matches. Profiles that inherit core get these for free.
  - ship-feature
  - triage-bug
  # Full think → plan → build → review → ship sprint flow.
  - sprint
evals:
  # Phase 4: structural eval scenarios. `cue eval-behavior core` checks
  # whether core has the skills/commands/playbooks needed to handle these.
  - feature-shipping
  - bug-triage
hooks:
  # Universal safety: block obviously destructive shell commands (rm -rf /, fork bombs, dd to /dev/sd*, etc.).
  # Every profile inherits core, so every cue user gets this for free.
  - bash-quality-preflight.json
  # Universal analytics: append one line per session-end to ~/.config/cue/session-log.jsonl
  # so `cue eval` sees real usage data for every profile, not just gstack.
  - session-summary.json
  # Refuse writes to .env, id_rsa, credentials.json, .pem/.key, ~/.ssh, ~/.aws, etc.
  - secrets-guard.json
  # Reject low-effort `git commit -m "wip"` / "fix" / "update" messages.
  - commit-message-guard.json
  # UserPromptSubmit hook: token-cost guard — one display-only nudge per size
  # tier (3MB/8MB transcript) suggesting /clear between tasks or /compact
  # mid-task. Cache reads scale with context length and dominate spend (97% in
  # the 2026-06 audit). Fail-open; disable with CUE_CONTEXT_NUDGE_OFF=1.
  - context-size-nudge.json
  # PreToolUse(Read) hook: token-cost guard — one display-only nudge at 25
  # main-session Read calls suggesting Explore/Agent delegation (subagent
  # context dies with it instead of being re-read every turn). Never blocks.
  # Fail-open; disable with CUE_READ_NUDGE_OFF=1.
  - read-delegate-nudge.json
  # SessionStart hook: once-a-day coding-agent spend digest via ccusage —
  # one display-only systemMessage line (today / yesterday / last-7d cost) on
  # the first session of the day. Pairs with tools/ccusage (ask-for-details)
  # and the ccusage statusline (live view). Fail-open; stamp-throttled;
  # disable with CUE_CCUSAGE_DAILY_OFF=1.
  - ccusage-daily-report.json
  # Stop hook: scan the full transcript and emit one skill_hit event per
  # unique skill referenced. Replaces the 50KB regex scrape with a full scan.
  # Feeds `cue profile evolve` with accurate per-skill firing data.
  - skill-fire-tracker.json
  # Stop hook: audit liedetector [VERIFIED]/[KNOWN] tags against the tool
  # calls actually observed this turn. Self-applied confidence tags are
  # gameable — this re-grounds them in observed behaviour. Warns (never
  # blocks) when [VERIFIED] appears with zero Read/Grep/inspection actions
  # or when [KNOWN] is used on time-sensitive subjects. ~30ms latency.
  - tag-audit.json
  # Stop hook: opt-in tag-density check. Warns (never blocks) when a long
  # response carries zero confidence tags, or when tags are spammed one-per-
  # word. No-op until ~/.config/cue/liedetector-tag-check exists; suppress a
  # single turn with [skip-tag-density]. Fail-open.
  - liedetector-tag-density.json
  # Stop hook: opt-in next-steps audit. Warns (never blocks) when a substantive
  # turn (>=1 file edit or >=3 Bash steps, >=600 chars) ends without a Next
  # steps block — re-grounds the meta/next-steps auto-fire behaviour in
  # observable output. No-op until ~/.config/cue/next-steps-check exists;
  # suppress a single turn with [skip-next-steps]. Fail-open.
  - next-steps-audit.json
  # UserPromptSubmit hook: on the FIRST prompt of a session, save it to
  # ~/.config/cue/first-prompts/<cwd-hash>.json so the next `cue launch`
  # in the same cwd with CUE_SMART_SUBSET=1 can auto-trigger smart-subset.
  - first-prompt-capture.json
  # UserPromptSubmit hook: on EVERY user prompt, detect vendor/tool keywords
  # (coolify, higgsfield, hostinger, etc.) that map to skills not currently
  # loaded in the active profile. Prints a "💡 Available skills" context
  # block so Claude can offer them instead of needing to "notice" the gap.
  # Pairs with meta/smart-loader — this is the proactive trigger.
  - smart-loader-suggest.json
  # UserPromptSubmit hook: classify the prompt by task hardness and print a
  # one-line model-routing reminder — HARD work stays on Opus, EASY/SEARCH and
  # MECHANICAL work gets delegated to a Sonnet subagent (already pinned via
  # CLAUDE_CODE_SUBAGENT_MODEL). Pairs with the "Model routing" persona block.
  # Confident-match-only + throttled (~5 min/session) so it adds ~0 per-message
  # tokens. Non-blocking. Suppress a single turn with [skip-route].
  - model-route-nudge.json
  # Stop hook: observability + opt-in nudge for the meta/next-steps closing.
  # Always appends one next_steps event per turn to analytics.jsonl (did a
  # substantive turn end with a Next steps block?). Only NUDGES (stderr, never
  # blocks) when ${HOME}/.config/cue/next-steps-nudge exists. Off by default.
  - next-steps-nudge.json
  # Stop hook: independent reviewer-agent loop. After a code-producing turn,
  # spawns a fresh reviewer (code-review-deep on Sonnet) over the working-tree
  # diff and BLOCKS until CRITICAL/HIGH findings are addressed + verified — the
  # enforced arm of the core persona's "Independent review before finishing"
  # rule. Recursion-guarded, round-capped (2), fail-open. OFF by default; enable
  # with `touch ~/.config/cue/auto-review-enabled`. Wired into every profile via
  # core so the loop is one flag away in any of them. Suppress one turn with
  # [skip-auto-review].
  - auto-review.json
  # Stricter destructive-command guard, opt-in via /careful. No-op until
  # ~/.config/cue/careful-mode exists.
  - careful-mode.json
  # Edit-scope guard, opt-in via /freeze <dir>. No-op until
  # ~/.config/cue/freeze-dir exists.
  - freeze-edit-scope.json
  # Stop hook: cue self-learner CAPTURE. Records where the active profile's skills
  # fell short (friction signals + an optional once-per-session live critic) as
  # skill_gap events in ~/.config/cue/analytics.jsonl. Promoted from the
  # skill-writer pilot to core so every profile learns. Never blocks Stop, fail-
  # open. OFF until BOTH `touch ~/.config/cue/.auto-improve-enabled` and telemetry
  # consent exist. See docs/self-learner.md.
  - profile-self-improve.json
  # Stop hook: cue self-learner ACT. Picks the most-flagged skill from the
  # captured skill_gap signals and evolves it (single-shot writer→lint→critic
  # loop, propose-only). 24h cooldown, canary auto-revert, never blocks Stop.
  # OFF until ALSO `touch ~/.config/cue/.auto-evolve-enabled`. See
  # docs/self-evolution-upgrade-plan.md.
  - auto-evolve.json
