name: full
icon: "🦄"
description: Diagnostic fallback profile that loads every local skill and MCP
inherits: core
skills:
  # Diagnostic catch-all: the "*/*" glob loads EVERY local skill at materialize
  # time (resolver-local expands it to all categories/slugs). This is why `full`
  # exists — it homes every skill that no lean profile claims, so `cue doctor`
  # reports zero D3 orphans without re-bloating core/gstack. Any newly-added
  # skill is auto-covered; no need to hand-maintain a list here.
  local:
    - "*/*"
mcps:
  - Higgsfield
  - colony
  - coolify
  - drawio
  - gbrain
  - headroom
  - hostinger-api
  - letsfg
  - obsidian-vault
  - polymarket-live
  - recodee
  - ruflo
  - soul-skills
