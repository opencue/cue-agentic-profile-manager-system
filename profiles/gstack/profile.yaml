    - gstack/ship
    - gstack/land-and-deploy
    - gstack/setup-deploy
    - gstack/canary
    - gstack/document-release
    # Design & real-browser QA
    - gstack/design-review
    - gstack/design-shotgun
    - gstack/devex-review
    - gstack/qa
    - gstack/qa-only
